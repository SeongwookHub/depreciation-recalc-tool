# 고정자산 감가상각비 재계산 검증 도구 설정 파일
#
# 이 파일을 수정하면 recalc.py 코드를 건드리지 않고도 다른 회사 파일/다른 감사
# 건에 맞춰 동작을 바꿀 수 있습니다. 이 파일이 없거나 아래 항목 중 일부가
# 빠져 있어도 프로그램은 죽지 않고, recalc.py에 내장된 기본값을 그대로 사용합니다.
#
# 여러 회사/여러 감사 건을 동시에 다루려면 이 파일을 복사해
# config_회사A.yaml 처럼 만들고 `python recalc.py --config config_회사A.yaml`로
# 실행하면 됩니다.

# 입력/출력 파일 경로. `python recalc.py --input ... --output ...`로 실행하면
# 그 값이 이 설정보다 항상 우선합니다.
input_path: sample_asset_ledger.xlsx
output_path: recalc_result.xlsx

# 기준일(YYYY-MM-DD): 이 날짜가 속한 회계연도(1/1~12/31)의 당기 감가상각비를
# 재계산합니다. 따옴표를 붙여도/안 붙여도 정상적으로 인식됩니다.
ref_date: "2025-12-31"

# 중요성 기준 금액(=AMPT, 원): 재계산 금액과 회사반영 금액의 차이의 절대값이
# 이 금액 이상이면 "유의한 차이", 미만이면 "경미한 차이"로 자동 분류합니다
# (재계산결과 시트의 실제 판정 로직에 쓰이는 값은 이것 하나뿐입니다).
materiality_threshold: 1000000

# 아래 두 값은 판정 로직에는 쓰이지 않고, 기준정보 시트에 참고용으로만
# 표시됩니다(전체 재무제표 수준 중요성과 수행중요성).
overall_materiality: 50000000       # 중요성
performance_materiality: 10000000   # 수행중요성(PM)

# 다기간(연도별) 비교 대상 회계연도 목록. 1개만 두면(기본값) 단일 연도만
# 계산합니다. 2개 이상 넣으면 연도별추이/연도별요약 시트가 추가로 생성되고,
# 전년대비 큰 폭으로 증감한 자산이 자동으로 표시됩니다.
# 예: comparison_years: [2023, 2024, 2025]
comparison_years: [2025]

# 다기간 비교에서 전년대비 이 비율(%) 이상 증감하면 "경고"로 표시합니다.
yoy_anomaly_threshold_pct: 20.0

# "유의한 차이" 자산의 AI 추정원인 코멘트 생성에 사용할 Claude 모델
# (.env의 ANTHROPIC_API_KEY가 없으면 이 값은 쓰이지 않고 해당 기능만 건너뜁니다).
anthropic_model: claude-sonnet-4-6

# 고정자산대장 컬럼명 매핑. 왼쪽은 이 프로그램이 이해하는 항목 이름(고정),
# 오른쪽만 실제 파일의 컬럼명으로 바꾸면 됩니다. 여기서 빠뜨린 항목은
# recalc.py 내장 기본값을 그대로 씁니다.
#
# 참고: "취득원가" 대신 "취득가액", "자산명" 대신 "자산코드"처럼 흔한 표기
# 차이는 동의어 사전(COLUMN_SYNONYMS)이 자동으로 흡수하므로, 대부분의 경우
# 이 항목 자체를 건드리지 않아도 됩니다. 그래도 자동으로 못 찾으면 실행 시
# 콘솔에 후보가 안내되니, 그걸 보고 아래 값을 채우면 됩니다.
column_map:
  자산명: 자산명
  자산분류: 자산분류(유형자산/무형자산)
  취득일: 취득일
  취득원가: 취득원가
  잔존가치: 잔존가치
  내용연수: 내용연수(년)
  상각방법: 상각방법(정액법/정률법)
  회사반영상각비: 회사반영_당기감가상각비
  처분일: 처분일
  재추정일: 내용연수재추정일
  재추정내용연수: 재추정후내용연수(년)
  재추정후상각방법: 재추정후상각방법(정액법/정률법)
  총예정생산량: 총예정생산량
  당기실제생산량: 당기실제생산량
  전기말누적생산량: 전기말누적생산량
  자본적지출일: 자본적지출일
  자본적지출액: 자본적지출액
  상각중단시작일: 상각중단시작일
  상각중단종료일: 상각중단종료일
  회사반영누계상각액: 회사반영_전기말감가상각누계액
